<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Experiment</title>

  <!-- Fireworks -->
  <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(to right, #2997bf, #45d1e1, #dedede);
      text-align: center;
      padding: 50px;
      overflow-x: hidden;
      margin: 0;
    }

    h1 {
      color: #e57676;
      font-size: 40px;
      font-family: 'Permanent Marker', cursive;
    }

    #message {
      font-size: 40px;
      color: #e43131;
      margin-top: 20px;
      font-family: 'Permanent Marker', cursive;
    }

    #content {
      position: relative;
      z-index: 2;
    }

    #fireworks-container {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .canva-container {
      position: relative;
      width: 100%;
      height: 600px;
      margin: 40px auto;
      max-width: 1000px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.2);
      background: white;
    }

    .canva-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    a {
      color: #2997bf;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- Fireworks -->
  <div id="fireworks-container"></div>

  <!-- Content -->
  <div id="content">

    <h1>Hello, I'm Hee Kai Wei</h1>

    <p id="message"></p>

    <!-- Canva Embed -->
    <div class="canva-container">
      <iframe
        loading="lazy"
        src="https://canva.link/ue27s2eag1986ww"
        allowfullscreen
      ></iframe>
    </div>

    <!-- Open Canva -->
    <p>
      <a
        href="https://canva.link/ue27s2eag1986ww"
        target="_blank"
      >
        Open Canva Design
      </a>
    </p>

  </div>

  <script>
    window.onload = () => {

      // Typing Effect
      const text = "Welcome to my website 👋";
      let i = 0;

      const typing = () => {
        if (i < text.length) {
          document.getElementById("message").innerHTML += text[i++];
          setTimeout(typing, 50);
        }
      };

      typing();

      // Fireworks
      const container = document.getElementById("fireworks-container");

      const fireworks = new Fireworks.Fireworks(container, {
        autoresize: true,
        speed: 2,
        acceleration: 1.05,
        friction: 0.95,
        gravity: 1.5,
        particles: 120,
        traceLength: 3,
        explosion: 5
      });

      fireworks.start();
    };
  </script>

</body>
</html>
